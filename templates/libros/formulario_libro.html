{% extends 'base.html' %}

{% block title %}{{ accion }} Libro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="mb-4">{{ accion }} Libro</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">{{ form.titulo.label }}</label>
                    {{ form.titulo }}
                </div>
                <div class="mb-3">
                    <label class="form-label">{{ form.autor.label }}</label>
                    {{ form.autor }}
                </div>
                <div class="mb-3">
                    <label class="form-label">{{ form.anio.label }}</label>
                    {{ form.anio }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">{{ accion }}</button>
                    <a href="{% url 'libros:listar' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
