{% extends 'base.html' %}

{% block title %}Eliminar Libro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 border-danger">
            <h3 class="text-danger mb-3">⚠️ Confirmar Eliminación</h3>
            <p>¿Estás seguro que deseas eliminar el libro:</p>
            <p class="fw-bold fs-5">{{ libro.titulo }}</p>
            <p class="text-muted">Autor: {{ libro.autor }} — Año: {{ libro.anio }}</p>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'libros:listar' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
